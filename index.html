    async function syncStats(doIncrement = false) {
        try {
            const r = await fetch(DB_URL);
            const data = await r.json() || { v_total: 0, v_today: 0, last_date: "" };
            const nowD = new Date().toLocaleDateString();
            let total = parseInt(data.v_total) || 0;
            let today = parseInt(data.v_today) || 0;
            let lastD = data.last_date || nowD;
            if (lastD !== nowD) { today = 0; lastD = nowD; }
            if (doIncrement) { total++; today++; }
            if (doIncrement) {
                await fetch(DB_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ v_total: total, v_today: today, last_date: lastD }) });
            }
            document.getElementById('v-total').innerText = total.toLocaleString();
            document.getElementById('v-today').innerText = today.toLocaleString();
            return { total, today };
        } catch(e) { console.error("Sync Error:", e); return { total: 0, today: 0 }; }
    }

                if(localStorage.getItem('claimed_' + currentSerialID)) document.getElementById('claim-content').innerHTML = "<b>【特典受取済み】</b>";
            }
            
            document.getElementById('x-share').setAttribute('data-text', `✨ RapiNz Z神社 ✨\n参拝日：${dStr}\nラッキーメンバー：${res.m}\n運勢：${res.t} 💎\n(${currentSerialID})\n#RapiNz #RapiNz御朱印`);
            if (!isDevMode) setCount(count + 1); document.getElementById('flash-overlay').classList.remove('flash-active');
        }, 850);
    }

    function tweetAction(e) { 
        e.preventDefault(); 
        const text = document.getElementById('x-share').getAttribute('data-text'); 
        const url = window.location.href.split('?')[0]; 
        const tweetContent = `${text}\n${url}`;
        const xUrl = `https://x.com/intent/post?text=${encodeURIComponent(tweetContent)}`;
        window.location.href = xUrl;
        setTimeout(() => { if (!document.hidden) window.open(xUrl, '_blank'); }, 500);
    }

    function claimReward() { if(confirm("スタッフの確認は済みましたか？")) { localStorage.setItem('claimed_' + currentSerialID, 'true'); document.getElementById('verify-watermark').style.display = 'none'; document.getElementById('claim-content').innerHTML = "<b>【特典受取済み】</b>"; } }
    function resetUI() { fadeOut(audioResult, 600); document.getElementById('result-area').classList.remove('active'); document.getElementById('main-header').style.display = 'block'; document.getElementById('start-area').classList.add('active'); document.getElementById('verify-watermark').style.display = 'none'; audioTop.volume = 0.15; audioTop.play().catch(()=>{}); updateUI(); }
    function getCount() { const d = new Date().toLocaleDateString(); if (localStorage.getItem('z_date') !== d) { localStorage.setItem('z_date', d); localStorage.setItem('z_count', '0'); } return parseInt(localStorage.getItem('z_count') || '0'); }
    function setCount(c) { localStorage.setItem('z_count', c); updateUI(); }
    function updateUI() { const c = getCount(); const r = 3 - c; document.getElementById('limit-display').innerText = isDevMode ? "🚀 Dev Mode" : `本日あと ${r} 回`; document.getElementById('draw-btn').disabled = (!isDevMode && r <= 0); }
    function initFloating() { const l = document.getElementById('emoji-layer'); const icons = ['⭐', '🌟', '✨', '💫']; for(let i=0; i<15; i++) { const e = document.createElement('div'); e.className = 'floating-emoji'; e.innerText = icons[Math.floor(Math.random()*icons.length)]; const s = Math.random() > 0.5 ? 'left' : 'right'; e.style.left = (s === 'left' ? Math.random()*15 : 85+Math.random()*15) + 'vw'; e.style.top = Math.random()*100 + 'vh'; e.style.setProperty('--duration', (7+Math.random()*12)+'s'); e.style.setProperty('--drift-x', (s === 'left' ? -30 : 30)+'px'); e.style.setProperty('--drift-y', (Math.random()-0.5)*100+'px'); e.style.setProperty('--max-opacity', 0.4+Math.random()*0.3); l.appendChild(e); } }
    document.getElementById('dev-trigger').addEventListener('click', () => { let tc = (window._tc || 0) + 1; window._tc = tc; if (tc >= 5) { isDevMode = true; updateUI(); alert("🚀 Dev Mode Active"); window._tc = 0; } setTimeout(() => window._tc = 0, 2000); });
    window.onload = async () => { initFloating(); await syncStats(); updateUI(); };
</script>
</body>
</html>
