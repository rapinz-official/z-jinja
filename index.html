    async function syncStats(doIncrement = false) {
        try {
            const r = await fetch(DB_URL);
            const data = await r.json() || { v_total: 0, v_today: 0, last_date: "" };
            const nowD = new Date().toLocaleDateString();
            let total = parseInt(data.v_total) || 0;
            let today = parseInt(data.v_today) || 0;
            let lastD = data.last_date || nowD;
            if (lastD !== nowD) { today = 0; lastD = nowD; }
            if (doIncrement) { total++; today++; }
            if (doIncrement) {
                await fetch(DB_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ v_total: total, v_today: today, last_date: lastD }) });
            }
            document.getElementById('v-total').innerText = total.toLocaleString();
            document.getElementById('v-today').innerText = today.toLocaleString();
            return { total, today };
        } catch(e) { return { total: 0, today: 0 }; }
    }

    function initAudio() { if (isAudioInit) return; audioTop.volume = 0.15; audioTop.play().catch(()=>{}); isAudioInit = true; }
    function fadeOut(audio, dur, cb) { if (!audio || audio.paused) { if(cb) cb(); return; } const start = audio.volume; const step = start / (dur / 50); const t = setInterval(() => { if (audio.volume > step) audio.volume -= step; else { audio.volume = 0; audio.pause(); clearInterval(t); if(cb) cb(); } }, 50); }
    function createBurst() { const rect = document.getElementById('draw-btn').getBoundingClientRect(); for (let i = 0; i < 40; i++) { const p = document.createElement('div'); p.className = 'particle'; p.innerText = ['✨', '⭐', '🌟', '💫', '💎'][Math.floor(Math.random() * 5)]; const angle = Math.random() * Math.PI * 2; const dist = 60 + Math.random() * 180; p.style.fontSize = (Math.random() * 15 + 15) + 'px'; p.style.setProperty('--dur', (1.5 + Math.random() * 1.5) + 's'); p.style.setProperty('--x', Math.cos(angle) * dist + 'px'); p.style.setProperty('--y', (Math.sin(angle) * dist + 80) + 'px'); p.style.setProperty('--r', (Math.random() * 720) + 'deg'); p.style.left = (rect.left + rect.width / 2) + 'px'; p.style.top = (rect.top + rect.height / 2) + 'px'; document.body.appendChild(p); setTimeout(() => p.remove(), 3000); } }

        fadeOut(audioTop, 400); audioKirakira.volume = 0.08; audioKirakira.currentTime = 0; audioKirakira.play().catch(()=>{});

        setTimeout(() => {
            audioTop.pause(); audioResult.volume = 0.5; audioResult.currentTime = 0; audioResult.play().catch(()=>{});
            setTimeout(() => { fadeOut(audioKirakira, 1500); }, 500);
            
            // 特典パネルを初期状態（ボタンあり）にリセット
            document.getElementById('claim-content').innerHTML = `
                <p style="font-size: 9px; font-weight: 900; color: var(--ra-pink); margin: 0 0 5px 0;">🎁 宇宙大吉特典：スタッフ確認用</p>
                <button id="claim-btn" class="btn-main" style="font-size: 13px; padding: 8px;" onclick="claimReward()">特典を受け取る</button>
            `;

            let res = (Math.random() < 0.1) ? uranaiData.filter(d => d.t.includes("大吉☄️"))[Math.floor(Math.random()*5)] : uranaiData[Math.floor(Math.random() * uranaiData.length)];
            const now = new Date(); const dStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
            currentSerialID = `Z-${stats.total.toString().padStart(7, '0')}`;
            
            document.getElementById('verify-watermark').innerText = `VALID: ${currentSerialID}`;
            document.getElementById('res-img').classList.remove('loaded'); document.getElementById('res-img').src = images[res.m]; document.getElementById('res-img').onload = () => document.getElementById('res-img').classList.add('loaded');
            document.getElementById('res-date').innerText = `参拝日時：${now.toLocaleString()}`;

    function setCount(c) { localStorage.setItem('z_count', c); updateUI(); }
    function updateUI() { const c = getCount(); const r = 3 - c; document.getElementById('limit-display').innerText = isDevMode ? "🚀 Dev Mode" : `本日あと ${r} 回`; document.getElementById('draw-btn').disabled = (!isDevMode && r <= 0); }
    function initFloating() { const l = document.getElementById('emoji-layer'); const icons = ['⭐', '🌟', '✨', '💫']; for(let i=0; i<15; i++) { const e = document.createElement('div'); e.className = 'floating-emoji'; e.innerText = icons[Math.floor(Math.random()*icons.length)]; const s = Math.random() > 0.5 ? 'left' : 'right'; e.style.left = (s === 'left' ? Math.random()*15 : 85+Math.random()*15) + 'vw'; e.style.top = Math.random()*100 + 'vh'; e.style.setProperty('--duration', (7+Math.random()*12)+'s'); e.style.setProperty('--drift-x', (s === 'left' ? -30 : 30)+'px'); e.style.setProperty('--drift-y', (Math.random()-0.5)*100+'px'); e.style.setProperty('--max-opacity', 0.4+Math.random()*0.3); l.appendChild(e); } }
    document.getElementById('dev-trigger').addEventListener('click', () => { let tc = (window._tc || 0) + 1; window._tc = tc; if (tc >= 5) { isDevMode = true; updateUI(); alert("🚀 Dev Mode Active"); window._tc = 0; } setTimeout(() => window._tc = 0, 2000); });
    
    window.onload = async () => { 
        initFloating(); await syncStats(); updateUI(); 
        [audioTop, audioKirakira, audioResult].forEach(audio => { audio.load(); });
    };
</script>
</body>
</html>
