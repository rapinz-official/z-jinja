        :root {
            --ra-main: #00B0FF; --ra-pink: #FF4081; --ra-bg-dark: #000510;

            --ari-mint: #00C853;
            --kose-pink: #E91E63;
            --taki-blue: #2962FF;
            --glass: rgba(255, 255, 255, 0.85); 
            --btn-grad: linear-gradient(135deg, #FF80AB 0%, #BA68C8 50%, #40C4FF 100%);
        }

        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background: radial-gradient(circle at center, #1A237E 0%, var(--ra-bg-dark) 70%);
            overflow: hidden; color: #333;
            -webkit-user-select: none; user-select: none;
        }

        .stars-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px);
            background-size: 200px 200px; z-index: 0; opacity: 0.4;
        }

        /* 浮遊エフェクト：文字を避ける（左右端から発生） */
        .floating-emoji {
            position: fixed; pointer-events: none; z-index: 1;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
            animation: spaceFloat var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes spaceFloat {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            15% { opacity: var(--max-opacity); }
            50% { transform: translate(var(--drift-x), var(--drift-y)) rotate(var(--drift-rot)); }
            85% { opacity: var(--max-opacity); }
            100% { transform: translate(calc(var(--drift-x) * 1.3), calc(var(--drift-y) * 1.3)) rotate(calc(var(--drift-rot) * 1.8)); opacity: 0; }
        }

        .outer-header { text-align: center; z-index: 10; margin-bottom: 15px; width: 90%; }
        .welcome-msg { font-size: 12px; font-weight: bold; color: #fff; line-height: 1.8; text-shadow: 0 0 10px var(--ra-main); margin-bottom: 5px; }
        .yoshi-yoshi { font-size: 16px; font-weight: 900; background: linear-gradient(to right, #40C4FF, #FF80AB); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shrine-icon { font-size: 40px; display: block; margin: 10px 0; filter: drop-shadow(0 0 10px #ff0000); }
        .main-title { font-size: 28px; font-weight: 900; color: #fff; margin: 5px 0; letter-spacing: 2px; text-shadow: 0 0 15px var(--ra-main); cursor: pointer; }
        .sub-title { font-size: 10px; color: rgba(255,255,255,0.8); letter-spacing: 4px; text-transform: uppercase; font-weight: bold; }

        .card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; padding: 25px 20px; max-width: 380px; width: 90%; text-align: center; 
            position: relative; z-index: 10; box-sizing: border-box; border: 1px solid rgba(255, 255, 255, 0.5);
            animation: neonGlow 3s ease-in-out infinite alternate;
        }
        @keyframes neonGlow { 0% { border-color: var(--ra-main); box-shadow: 0 0 15px var(--ra-main); } 100% { border-color: var(--ra-pink); box-shadow: 0 0 25px var(--ra-pink); } }

        .steps { background: rgba(255, 255, 255, 0.5); border-radius: 20px; padding: 18px; margin-bottom: 20px; font-size: 12px; line-height: 2.2; color: #000; font-weight: 800; }
        
        .btn-main { 
            background: var(--btn-grad); color: #fff; padding: 16px 10px; border-radius: 100px; 
            font-size: 17px; font-weight: bold; width: 100%; border: none; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 6px 15px rgba(255, 64, 129, 0.3); display: flex; align-items: center; justify-content: center; text-decoration: none;
        }
        .btn-main:active:not(:disabled) { transform: scale(0.96); }
        .btn-main:disabled { background: #ccc; box-shadow: none; }

        #res-date { font-size: 11px; color: #444; font-weight: bold; margin-bottom: 8px; font-family: monospace; }
        .img-container { position: relative; width: 220px; height: 220px; margin: 0 auto 15px; overflow: hidden; border-radius: 25px; background: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 2px solid #fff; }
        .fortune-img { width: 100%; height: 100%; object-fit: cover; }

        #res-member { font-size: 16px; font-weight: 900; margin-bottom: 8px; }
        #res-fortune { font-size: 32px; font-weight: 950; margin-bottom: 15px; letter-spacing: 0px; }
        #res-desc { font-size: 14px; line-height: 1.8; padding: 0 10px; margin-bottom: 20px; text-align: left; color: #000; font-weight: 800; border-left: 4px solid var(--ra-main); }

        #start-area, #result-area { display: none; }
        .active { display: block !important; }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; pointer-events: none; opacity: 0; }
        .flash-active { animation: flashAnim 0.6s ease-out; }
        @keyframes flashAnim { 0% { opacity: 0.8; } 100% { opacity: 0; } }
    </style>
</head>

    function initFloatingEmojis() {
        const layer = document.getElementById('emoji-layer');
        const icons = ['✧', '🌟', '✨', '✡'];
        const count = 20; 
        for(let i=0; i<count; i++) {
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.innerText = icons[Math.floor(Math.random()*icons.length)];
            const side = Math.random() > 0.5 ? 'left' : 'right';
            const horizontalPos = side === 'left' ? (Math.random() * 20) : (80 + Math.random() * 20);
            const size = 12 + Math.random() * 18;
            const duration = 7 + Math.random() * 12;
            const driftX = side === 'left' ? -(30 + Math.random() * 70) : (30 + Math.random() * 70);
            const driftY = (Math.random() - 0.5) * 150;
            const driftRot = (Math.random() - 0.5) * 120;
            const maxOpacity = 0.3 + Math.random() * 0.4;
            el.style.left = horizontalPos + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            el.style.fontSize = size + 'px';
            el.style.setProperty('--duration', duration + 's');
            el.style.setProperty('--drift-x', driftX + 'px');
            el.style.setProperty('--drift-y', driftY + 'px');
            el.style.setProperty('--drift-rot', driftRot + 'deg');
            el.style.setProperty('--max-opacity', maxOpacity);
            el.style.animationDelay = (Math.random() * -15) + 's';
            layer.appendChild(el);
        }
    }

    document.getElementById('dev-trigger').addEventListener('click', () => {
        tapCount++;
        clearTimeout(devTimer);
        devTimer = setTimeout(() => { tapCount = 0; }, 2000);
        if (tapCount >= 5) {
            isDevMode = true; localStorage.setItem('z_count', '0'); updateUI();
            alert("🚀 Developer Mode: UNLOCKED"); tapCount = 0;
        }
    });

    function uranaiAction(e) {
        const count = getCount();
        if (!isDevMode && count >= 3) return;
        document.getElementById('flash-overlay').classList.add('flash-active');
        
        setTimeout(() => {
            const res = uranaiData[Math.floor(Math.random() * uranaiData.length)];
            const now = new Date();
            const dateStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            document.getElementById('res-date').innerText = `参拝日時：${dateStr}`;
            document.getElementById('res-img').src = images[res.m];
            
            document.getElementById('start-area').classList.remove('active');
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('result-area').classList.add('active');
            
            const memEl = document.getElementById('res-member');
            memEl.innerText = `ラッキーメンバー ${res.m}`; memEl.style.color = res.c;
            const fortEl = document.getElementById('res-fortune');
            fortEl.innerText = res.t; fortEl.style.color = res.c;
            document.getElementById('res-desc').innerText = res.d;
            
            const tweetText = `✨ RapiNz Z神社 ✨\n本日のラッキーメンバーは【${res.m}】💎\n運勢は【${res.t}】でした！\n(参拝日時：${dateStr})\n\n#RapiNz #RapiNz宇宙御朱印`;
            document.getElementById('x-share').setAttribute('data-text', tweetText);
            
            if (!isDevMode) setCount(count + 1);
            document.getElementById('flash-overlay').classList.remove('flash-active');
        }, 500);
    }

    function tweetAction(e) {
        e.preventDefault();
        const text = document.getElementById('x-share').getAttribute('data-text');
        const url = window.location.href.split('?')[0];
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text + "\n" + url)}`, '_blank');
    }

    function getCount() { const d = new Date().toLocaleDateString(); if (localStorage.getItem('z_date') !== d) { localStorage.setItem('z_date', d); localStorage.setItem('z_count', '0'); } return parseInt(localStorage.getItem('z_count') || '0'); }
    function setCount(c) { localStorage.setItem('z_count', c); updateUI(); }
    function updateUI() { const c = getCount(); const r = 3 - c; document.getElementById('limit-display').innerText = isDevMode ? "🚀 Dev Mode" : `本日あと ${r} 回`; document.getElementById('draw-btn').disabled = (!isDevMode && r <= 0); }
    function updateVisitors() { const d = new Date().toLocaleDateString(); let t = parseInt(localStorage.getItem('v_today') || "0"); let T = parseInt(localStorage.getItem('v_total') || "0"); if (localStorage.getItem('v_date') !== d) { t = 0; localStorage.setItem('v_date', d); } t++; T++; localStorage.setItem('v_today', t); localStorage.setItem('v_total', T); document.getElementById('v-today').innerText = t.toLocaleString(); document.getElementById('v-total').innerText = T.toLocaleString(); }
    function resetUI() { document.getElementById('result-area').classList.remove('active'); document.getElementById('main-header').style.display = 'block'; document.getElementById('start-area').classList.add('active'); updateUI(); }
