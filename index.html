            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;

            background: radial-gradient(circle at center, #1A237E 0%, var(--ra-bg-dark) 70%);
            overflow: hidden; color: #333; -webkit-user-select: none; user-select: none;
            text-align: center;
        }

        .stars-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px);
            background-size: 200px 200px; z-index: 0; opacity: 0.4;
        }

        .floating-emoji {
            position: fixed; pointer-events: none; z-index: 1;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.4));
            animation: spaceFloat var(--duration) ease-in-out infinite;
            opacity: 0; font-size: 8px;
        }
        @keyframes spaceFloat {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            15% { opacity: var(--max-opacity); }
            50% { transform: translate(var(--drift-x), var(--drift-y)) rotate(var(--drift-rot)); }
            100% { transform: translate(calc(var(--drift-x) * 1.3), calc(var(--drift-y) * 1.3)) rotate(calc(var(--drift-rot) * 1.8)); opacity: 0; }
        }

        .particle {
            position: fixed; pointer-events: none; z-index: 100;
            animation: slowDreamyBurst 1.8s cubic-bezier(0.1, 0.4, 0.2, 1) forwards;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes slowDreamyBurst {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; transform: translate(var(--mx), var(--my)) scale(1.4) rotate(45deg); }
            100% { transform: translate(var(--x), var(--y)) scale(0.8) rotate(180deg); opacity: 0; filter: blur(10px); }
        }

        .card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; padding: 25px 20px; max-width: 380px; width: 90%; text-align: center; 
            position: relative; z-index: 10; border: 1px solid rgba(255, 255, 255, 0.5);
            animation: neonGlow 3s ease-in-out infinite alternate;
            transition: filter 0.5s ease;
        }
        @keyframes neonGlow { 0% { border-color: var(--ra-main); box-shadow: 0 0 15px var(--ra-main); } 100% { border-color: var(--ra-pink); box-shadow: 0 0 25px var(--ra-pink); } }

        .btn-main { 
            background: var(--btn-grad); color: #fff; padding: 16px 10px; border-radius: 100px; 
            font-size: 17px; font-weight: bold; width: 100%; border: none; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 6px 15px rgba(255, 64, 129, 0.3); display: flex; align-items: center; justify-content: center;
            margin: 0 auto; outline: none;
        }
        .btn-main:active:not(:disabled) { transform: scale(0.94); }

        .img-container { 
            position: relative; width: 220px; height: 220px; margin: 0 auto 15px; 
            overflow: hidden; border-radius: 25px; background: #111; border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
        }
        .fortune-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; opacity: 0; }
        .fortune-img.loaded { opacity: 1; }

        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150%; height: 100%; display: none; align-items: center; justify-content: center;
            pointer-events: none; z-index: 5; opacity: 0.08; color: #000; font-size: 32px; font-weight: 900;
            white-space: nowrap; animation: waterMove 10s linear infinite;
        }
        @keyframes waterMove {
            0%, 100% { transform: translate(-50%, -50%) rotate(-25deg) translateX(-20px); }
            50% { transform: translate(-50%, -50%) rotate(-25deg) translateX(20px); }
        }

        #start-area, #result-area { display: none; }
        .active { display: block !important; }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; pointer-events: none; opacity: 0; }
        .flash-active { animation: flashAnim 0.6s ease-out; }
        @keyframes flashAnim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

    // --- 音響ロジック ---
    const bgmResult = document.getElementById('bgm-result');
    const seGoshuin = document.getElementById('se-goshuin');

    function fadeOutAudio(audio, duration) {
        const startVol = audio.volume;
        const step = 0.05;
        const interval = duration / (startVol / step);
        const timer = setInterval(() => {
            if (audio.volume > step) {
                audio.volume -= step;
            } else {
                audio.volume = 0; audio.pause();
                clearInterval(timer);
            }
        }, interval);
    }

    // --- エフェクト ---
    function createBurst() {
        const rect = document.getElementById('draw-btn').getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const colors = ['#FFD1DC', '#B3E5FC', '#FFF9C4', '#F3E5F5', '#E8F5E9'];
        for (let i = 0; i < 28; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            if (Math.random() > 0.4) {
                p.innerText = ['✨', '⭐', '🌟'][Math.floor(Math.random() * 3)];
                p.style.fontSize = (Math.random() * 10 + 15) + 'px';
                p.style.color = colors[Math.floor(Math.random() * colors.length)];
            } else {
                const size = Math.random() * 8 + 6;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.borderRadius = '50%'; p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.boxShadow = `0 0 10px ${p.style.background}`;
            }
            const angle = (Math.PI * 2 * i) / 28 + (Math.random() * 0.5);
            p.style.setProperty('--mx', Math.cos(angle) * 80 + 'px');
            p.style.setProperty('--my', Math.sin(angle) * 80 + 'px');
            p.style.setProperty('--x', Math.cos(angle) * 160 + 'px');
            p.style.setProperty('--y', Math.sin(angle) * 160 + 'px');
            p.style.left = centerX + 'px'; p.style.top = centerY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1800);
        }
    }

    // --- アクション ---
    let isDevMode = false;
    let currentSessionID = "";

    function uranaiAction(e) {
        const count = getCount();
        if (!isDevMode && count >= 3) {
            alert("本日の参拝上限に達しました🪐"); return;
        }

        // BGM開始（Z-jinja.wav）
        bgmResult.volume = 0.3;
        bgmResult.currentTime = 0;
        bgmResult.play();

        createBurst();
        document.getElementById('flash-overlay').classList.add('flash-active');
        
        setTimeout(() => {
            // 結果表示SE
            seGoshuin.currentTime = 0;
            seGoshuin.volume = 0.7;
            seGoshuin.play();

            const res = uranaiData[Math.floor(Math.random() * uranaiData.length)];
            const now = new Date();
            const dateStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            currentSessionID = `RA-${now.getTime().toString().slice(-6)}`;
            const watermark = document.getElementById('verify-watermark');
            watermark.innerText = `VALID: ${currentSessionID}`;

            const imgEl = document.getElementById('res-img');
            imgEl.classList.remove('loaded'); imgEl.src = images[res.m];
            imgEl.onload = () => imgEl.classList.add('loaded');
            
            document.getElementById('res-date').innerText = `参拝日時：${dateStr}`;
            document.getElementById('start-area').classList.remove('active');
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('result-area').classList.add('active');
            
            document.getElementById('res-member').innerText = `ラッキーメンバー ${res.m}`;
            document.getElementById('res-member').style.color = res.c;
            document.getElementById('res-fortune').innerText = res.t;
            document.getElementById('res-fortune').style.color = res.c;
            document.getElementById('res-desc').innerText = res.d;

            if (res.t === "宇宙大吉☄️") {
                watermark.style.display = 'flex';
                document.getElementById('reward-panel').style.display = 'block';
            } else {
                watermark.style.display = 'none';
                document.getElementById('reward-panel').style.display = 'none';
            }

            const tweetText = `✨ RapiNz Z神社 ✨\nラッキーメンバー：${res.m}\n運勢：${res.t} 💎\n(ID:${currentSessionID})\n#RapiNz #RapiNz宇宙御朱印`;
            document.getElementById('x-share').setAttribute('data-text', tweetText);
            if (!isDevMode) setCount(count + 1);
            document.getElementById('flash-overlay').classList.remove('flash-active');
        }, 850);
    }

    function resetUI() { 
        // BGMとSEを優雅にフェードアウト
        fadeOutAudio(bgmResult, 1000);
        fadeOutAudio(seGoshuin, 1000);

        document.getElementById('result-area').classList.remove('active'); 
        document.getElementById('main-header').style.display = 'block'; 
        document.getElementById('start-area').classList.add('active'); 
        document.getElementById('verify-watermark').style.display = 'none'; 
        updateUI(); 
    }

        }

    function tweetAction(e) {
        e.preventDefault();
        const text = document.getElementById('x-share').getAttribute('data-text');
        const content = text + "\n" + window.location.href.split('?')[0];
        const appUrl = `twitter://post?message=${encodeURIComponent(content)}`;
        const webUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(content)}`;
        const start = Date.now(); window.location.href = appUrl;
        setTimeout(() => { if (Date.now() - start < 2000) window.open(webUrl, '_blank'); }, 500);
    }
    function getCount() { const d = new Date().toLocaleDateString(); if (localStorage.getItem('z_date') !== d) { localStorage.setItem('z_date', d); localStorage.setItem('z_count', '0'); } return parseInt(localStorage.getItem('z_count') || '0'); }
    function setCount(c) { localStorage.setItem('z_count', c); updateUI(); }
    function updateUI() { const c = getCount(); const r = 3 - c; document.getElementById('limit-display').innerText = isDevMode ? "🚀 Dev Mode" : `本日あと ${r} 回`; document.getElementById('draw-btn').disabled = (!isDevMode && r <= 0); }
    function updateVisitors() { const d = new Date().toLocaleDateString(); let t = parseInt(localStorage.getItem('v_today') || "0"); let T = parseInt(localStorage.getItem('v_total') || "0"); if (localStorage.getItem('v_date') !== d) { t = 0; localStorage.setItem('v_date', d); } t++; T++; localStorage.setItem('v_today', t); localStorage.setItem('v_total', T); document.getElementById('v-today').innerText = t.toLocaleString(); document.getElementById('v-total').innerText = T.toLocaleString(); }
    function initFloatingEmojis() {
        const layer = document.getElementById('emoji-layer');
        const icons = ['⭐', '🌟', '✨', '💫'];
        for(let i=0; i<20; i++) {
            const el = document.createElement('div');
            el.className = 'floating-emoji'; el.innerText = icons[Math.floor(Math.random()*icons.length)];
            const side = Math.random() > 0.5 ? 'left' : 'right';
            const hPos = side === 'left' ? (Math.random() * 20) : (80 + Math.random() * 20);
            el.style.left = hPos + 'vw'; el.style.top = Math.random() * 100 + 'vh';
            el.style.setProperty('--duration', (7 + Math.random() * 12) + 's');
            el.style.setProperty('--drift-x', (side === 'left' ? -50 : 50) + 'px');
            el.style.setProperty('--drift-y', (Math.random() - 0.5) * 150 + 'px');
            el.style.setProperty('--drift-rot', (Math.random() - 0.5) * 120 + 'deg');
            el.style.setProperty('--max-opacity', 0.2 + Math.random() * 0.3);
            el.style.animationDelay = (Math.random() * -15) + 's';
            layer.appendChild(el);
        }
    }
    document.getElementById('dev-trigger').addEventListener('click', () => {
        let tc = (window._tc || 0) + 1; window._tc = tc;
        if (tc >= 5) { isDevMode = true; updateUI(); alert("🚀 Dev Mode"); window._tc = 0; }
        setTimeout(() => window._tc = 0, 2000);
    });
    window.addEventListener('blur', () => { document.getElementById('main-card').style.filter = 'blur(15px)'; });
    window.addEventListener('focus', () => { document.getElementById('main-card').style.filter = 'none'; });
    window.onload = () => { initFloatingEmojis(); updateVisitors(); updateUI(); };
