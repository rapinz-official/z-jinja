    // --- 音響設定 ---
    const audioTop = document.getElementById('audio-top');

    let isAudioInit = false;

    function initAudio() {
        if (isAudioInit) return;
        audioTop.volume = 0.15; audioTop.play(); isAudioInit = true;
    }

    function fadeOut(audio, duration) {
        if (!audio || audio.paused) return;
        const startVol = audio.volume;
        const interval = 50;
        const step = startVol / (duration / interval);
        const timer = setInterval(() => {
            if (audio.volume > step) { audio.volume -= step; }
            else { audio.volume = 0; audio.pause(); clearInterval(timer); }
        }, interval);
    }

    // --- エフェクト ---
    function createBurst() {
        const rect = document.getElementById('draw-btn').getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        for (let i = 0; i < 45; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = ['✨', '⭐', '🌟', '💫', '💎'][Math.floor(Math.random() * 5)];
            const angle = Math.random() * Math.PI * 2;
            const dist = 80 + Math.random() * 220;
            p.style.fontSize = (Math.random() * 15 + 18) + 'px';
            p.style.setProperty('--dur', (1.5 + Math.random() * 1.5) + 's');
            p.style.setProperty('--mx', Math.cos(angle) * (dist * 0.4) + 'px');
            p.style.setProperty('--my', Math.sin(angle) * (dist * 0.4) + 'px');
            p.style.setProperty('--x', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--y', (Math.sin(angle) * dist + 150) + 'px');
            p.style.setProperty('--r', (Math.random() * 720 - 360) + 'deg');
            p.style.setProperty('--s', (Math.random() * 0.5 + 0.5));
            p.style.left = centerX + 'px'; p.style.top = centerY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }
    }

    function setCount(c) { localStorage.setItem('z_count', c); updateUI(); }
    function updateUI() { const c = getCount(); const r = 3 - c; document.getElementById('limit-display').innerText = isDevMode ? "🚀 Dev Mode" : `本日あと ${r} 回`; document.getElementById('draw-btn').disabled = (!isDevMode && r <= 0); }
    function updateVisitors() { const d = new Date().toLocaleDateString(); let t = parseInt(localStorage.getItem('v_today') || "0"); let T = parseInt(localStorage.getItem('v_total') || "0"); if (localStorage.getItem('v_date') !== d) { t = 0; localStorage.setItem('v_date', d); } t++; T++; localStorage.setItem('v_today', t); localStorage.setItem('v_total', T); document.getElementById('v-today').innerText = t.toLocaleString(); document.getElementById('v-total').innerText = T.toLocaleString(); }
    function initFloatingEmojis() { const layer = document.getElementById('emoji-layer'); const icons = ['⭐', '🌟', '✨', '💫']; for(let i=0; i<20; i++) { const el = document.createElement('div'); el.className = 'floating-emoji'; el.innerText = icons[Math.floor(Math.random()*icons.length)]; const side = Math.random() > 0.5 ? 'left' : 'right'; const hPos = side === 'left' ? (Math.random() * 20) : (80 + Math.random() * 20); el.style.left = hPos + 'vw'; el.style.top = Math.random() * 100 + 'vh'; el.style.setProperty('--duration', (7 + Math.random() * 12) + 's'); el.style.setProperty('--drift-x', (side === 'left' ? -50 : 50) + 'px'); el.style.setProperty('--drift-y', (Math.random() - 0.5) * 150 + 'px'); el.style.setProperty('--drift-rot', (Math.random() - 0.5) * 120 + 'deg'); el.style.setProperty('--max-opacity', 0.2 + Math.random() * 0.3); el.style.animationDelay = (Math.random() * -15) + 's'; layer.appendChild(el); } }
    document.getElementById('dev-trigger').addEventListener('click', () => { let tc = (window._tc || 0) + 1; window._tc = tc; if (tc >= 5) { isDevMode = true; updateUI(); alert("🚀 Dev Mode Active"); window._tc = 0; } setTimeout(() => window._tc = 0, 2000); });
    window.onload = () => { initFloatingEmojis(); updateVisitors(); updateUI(); };
</script>
