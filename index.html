<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --ra-main: #00B0FF; --ra-pink: #FF4081; --ra-bg-dark: #000510;
            --keigo-yellow: #D9A300; --ari-mint: #00C853; --kose-pink: #E91E63; --taki-blue: #2962FF;
            --glass: rgba(255, 255, 255, 0.9); 
            --btn-grad: linear-gradient(135deg, #FF80AB 0%, #BA68C8 50%, #40C4FF 100%);
            --x-blue-grad: linear-gradient(45deg, #00B0FF, #40C4FF, #81D4FA);
        }
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Helvetica Neue', Arial, sans-serif; background: radial-gradient(circle at center, #1A237E 0%, var(--ra-bg-dark) 70%); overflow: hidden; color: #333; -webkit-user-select: none; user-select: none; text-align: center; }
        .stars-base { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px); background-size: 200px 200px; z-index: 0; opacity: 0.4; }
        .floating-emoji { position: fixed; pointer-events: none; z-index: 1; opacity: 0; font-size: 8px; animation: spaceFloat var(--duration) ease-in-out infinite; }
        @keyframes spaceFloat { 0% { transform: translate(0, 0); opacity: 0; } 15% { opacity: var(--max-opacity); } 100% { transform: translate(var(--drift-x), var(--drift-y)); opacity: 0; } }
        .particle { position: fixed; pointer-events: none; z-index: 100; animation: randomBurst var(--dur) cubic-bezier(0.1, 0.8, 0.3, 1) forwards; display: flex; align-items: center; justify-content: center; }
        @keyframes randomBurst { 0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; transform: translate(-50%, -50%) scale(1.6); } 100% { transform: translate(var(--x), var(--y)) scale(0.5) rotate(var(--r)); opacity: 0; } }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 35px; padding: 20px 15px; max-width: 340px; width: 85%; position: relative; z-index: 10; border: 1px solid rgba(255, 255, 255, 0.5); animation: neonGlow 3s ease-in-out infinite alternate; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @keyframes neonGlow { 0% { border-color: var(--ra-main); box-shadow: 0 0 15px var(--ra-main); } 100% { border-color: var(--ra-pink); box-shadow: 0 0 20px var(--ra-pink); } }
        .btn-main { background: var(--btn-grad); color: #fff; padding: 14px 10px; border-radius: 100px; font-size: 16px; font-weight: bold; width: 100%; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.3); margin: 0 auto; outline: none; display: block; }
        .btn-main:active:not(:disabled) { transform: scale(0.95); }
        .btn-main:disabled { background: #ccc !important; box-shadow: none !important; cursor: not-allowed; opacity: 0.6; }
        .btn-x { background: var(--x-blue-grad); color: #fff; padding: 12px 10px; border-radius: 100px; font-size: 15px; font-weight: 900; width: 90%; border: 2px solid rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; margin: 10px auto; text-decoration: none; text-shadow: 0 1px 2px rgba(0,0,0,0.2); box-shadow: 0 4px 15px rgba(0, 176, 255, 0.4); }
        .img-container { position: relative; width: 180px; height: 180px; margin: 0 auto 10px; overflow: hidden; border-radius: 20px; background: #111; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; }

        .fortune-img.loaded { opacity: 1; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150%; display: none; align-items: center; justify-content: center; pointer-events: none; z-index: 5; opacity: 0.08; color: #000; font-size: 28px; font-weight: 900; white-space: nowrap; animation: waterMove 10s linear infinite; }

        .footer-info { font-size: 9px; color: #000; margin-top: 15px; line-height: 1.5; font-weight: 800; opacity: 0.7; }

</head>

    const audioTop = document.getElementById('audio-top');
    const audioKirakira = document.getElementById('audio-kirakira');
    const audioResult = document.getElementById('audio-result');
    let isAudioInit = false;

    function initAudio() { if (isAudioInit) return; audioTop.volume = 0.15; audioTop.play().catch(()=>{}); isAudioInit = true; }
    function stopAllAudio() { [audioTop, audioResult].forEach(a => { a.pause(); a.currentTime = 0; }); }
    function fadeOut(audio, duration, callback) { if (!audio || audio.paused) { if(callback) callback(); return; } const startVol = audio.volume; const step = startVol / (duration / 50); const timer = setInterval(() => { if (audio.volume > step) { audio.volume -= step; } else { audio.volume = 0; audio.pause(); clearInterval(timer); if(callback) callback(); } }, 50); }

    function createBurst() {
        const rect = document.getElementById('draw-btn').getBoundingClientRect();
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle'; p.innerText = ['✨', '⭐', '🌟', '💫', '💎'][Math.floor(Math.random() * 5)];
            const angle = Math.random() * Math.PI * 2;
            const dist = 60 + Math.random() * 180;
            p.style.fontSize = (Math.random() * 15 + 15) + 'px';
            p.style.setProperty('--dur', (1.5 + Math.random() * 1.5) + 's');
            p.style.setProperty('--x', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--y', (Math.sin(angle) * dist + 80) + 'px');
            p.style.setProperty('--r', (Math.random() * 720) + 'deg');
            p.style.left = (rect.left + rect.width / 2) + 'px'; p.style.top = (rect.top + rect.height / 2) + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 3000);
        }
    }

    let isDevMode = false; let currentSessionID = "";

    function getCount() { const d = new Date().toLocaleDateString(); if (localStorage.getItem('z_date') !== d) { localStorage.setItem('z_date', d); localStorage.setItem('z_count', '0'); } return parseInt(localStorage.getItem('z_count') || '0'); }

    function initFloatingEmojis() { const layer = document.getElementById('emoji-layer'); const icons = ['⭐', '🌟', '✨', '💫']; for(let i=0; i<15; i++) { const el = document.createElement('div'); el.className = 'floating-emoji'; el.innerText = icons[Math.floor(Math.random()*icons.length)]; const side = Math.random() > 0.5 ? 'left' : 'right'; el.style.left = (side === 'left' ? Math.random()*15 : 85+Math.random()*15) + 'vw'; el.style.top = Math.random()*100 + 'vh'; el.style.setProperty('--duration', (7+Math.random()*12)+'s'); el.style.setProperty('--drift-x', (side === 'left' ? -30 : 30)+'px'); el.style.setProperty('--drift-y', (Math.random()-0.5)*100+'px'); el.style.setProperty('--max-opacity', 0.15+Math.random()*0.15); layer.appendChild(el); } }
