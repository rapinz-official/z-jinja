        }

            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background: radial-gradient(circle at center, #1A237E 0%, var(--ra-bg-dark) 70%);
            overflow-x: hidden; color: #333;
            -webkit-user-select: none; user-select: none;
        }

        .stars-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px);
            background-size: 200px 200px; z-index: 0; opacity: 0.6;
        }

        .floating-emoji { position: absolute; pointer-events: none; z-index: 1; opacity: 0.5; animation: floatAnim 10s ease-in-out infinite; }
        @keyframes floatAnim { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(30px, -40px) rotate(20deg); } }

        .star-particle {
            position: fixed; pointer-events: none; z-index: 1000; font-size: 24px;
            animation: starShoot 0.8s ease-out forwards;
        }
        @keyframes starShoot {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr)); opacity: 0; }
        }

        .outer-header {
            text-align: center; z-index: 10; margin-bottom: 20px; width: 90%;
        }
        .welcome-msg { 
            font-size: 12px; font-weight: bold; color: #fff; line-height: 1.8; 
            text-shadow: 0 0 10px var(--ra-main); margin-bottom: 5px;
        }
        .yoshi-yoshi { 
            font-size: 16px; font-weight: 900; 
            background: linear-gradient(to right, #00BFFF, #FF69B4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }
        .shrine-icon { font-size: 40px; display: block; margin: 10px 0; filter: drop-shadow(0 0 10px #ff0000); }
        .main-title { 
            font-size: 28px; font-weight: 900; color: #fff; margin: 5px 0; 
            letter-spacing: 2px; text-shadow: 0 0 15px var(--ra-main), 0 0 5px #fff;
            cursor: pointer;
        }
        .sub-title { 
            font-size: 11px; color: rgba(255,255,255,0.85); letter-spacing: 4px; 
            text-transform: uppercase; font-weight: bold; margin-bottom: 10px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; padding: 25px 20px;
            max-width: 380px; width: 92%; text-align: center; position: relative; z-index: 10;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: neonGlow 3s ease-in-out infinite alternate;
        }
        @keyframes neonGlow {
            0% { border-color: var(--ra-main); box-shadow: 0 0 15px var(--ra-main); }
            100% { border-color: var(--ra-pink); box-shadow: 0 0 30px var(--ra-pink); }
        }

        .steps { 
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 20px; padding: 18px; margin-bottom: 20px; 
            font-size: 12px; line-height: 2.2; color: #000; font-weight: 800;
        }
        
        /* ボタンの中央配置を強化 */
        .btn-main { 
            background: linear-gradient(135deg, var(--ra-main), var(--ra-pink)); 
            color: #fff; padding: 18px; border-radius: 100px; font-size: 16px; font-weight: bold; 
            width: 100%; border: none; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(3, 169, 244, 0.3);
            display: flex; align-items: center; justify-content: center;
            text-align: center; box-sizing: border-box;
        }
        .btn-main:active:not(:disabled) { transform: scale(0.95); }
        .btn-main:disabled { background: #444 !important; color: #888; box-shadow: none; }

        .limit-display { font-size: 13px; font-weight: bold; color: #000; margin: 10px 0; }
        .visitor-panel { display: flex; justify-content: center; gap: 15px; margin-top: 15px; background: rgba(0, 0, 0, 0.15); border-radius: 12px; padding: 10px; }
        .v-label { font-size: 9px; color: #111; display: block; font-weight: 900; }
        .v-count { font-size: 14px; font-weight: bold; color: #000; font-family: monospace; }

        .img-container { 
            position: relative; width: 210px; height: 210px; margin: 0 auto 15px; 
            overflow: hidden; border-radius: 25px; background: #000;
        }
        .fortune-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; }
        .fortune-img.loaded { opacity: 1; }
        .hologram { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%); 
            animation: holo 4s infinite; pointer-events: none;
        }
        @keyframes holo { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* 結果文字の調整（発光をなくし色を濃く） */
        #res-member { font-size: 15px; font-weight: 900; margin-bottom: 8px; }
        #res-fortune { font-size: 30px; font-weight: 950; margin-bottom: 15px; }
        #res-desc { font-size: 14px; line-height: 1.8; padding: 0 10px; margin-bottom: 20px; text-align: left; color: #000; font-weight: 800; }

        .footer-info { font-size: 10px; color: #000; margin-top: 20px; line-height: 1.6; font-weight: 900; }
        .reset-btn { background:none; border:none; color:#000; text-decoration:underline; margin-top:15px; cursor:pointer; font-size: 15px; font-weight: 900; }

        #start-area, #result-area { display: none; }
        .active { display: block !important; }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; pointer-events: none; opacity: 0; }
        .flash-active { animation: flashAnim 0.6s ease-out; }
    </style>
</head>

    };

    let isDevMode = false;
    let tapCount = 0;
    let audioCtx = null;

    const starField = document.getElementById('star-field');
    for(let i=0; i<12; i++) {
        const star = document.createElement('div');
        star.className = 'floating-emoji';
        star.innerText = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
        star.style.top = Math.random()*100 + '%';
        star.style.left = Math.random()*100 + '%';
        star.style.animationDelay = (Math.random()*-10) + 's';
        starField.appendChild(star);
    }

    document.getElementById('dev-trigger').addEventListener('click', () => {
        tapCount++;
        clearTimeout(window.devTimer);
        window.devTimer = setTimeout(() => { tapCount = 0; }, 2000);
        if (tapCount >= 5) {
            isDevMode = true;
            localStorage.setItem('z_count', '0');
            updateUI();
            alert("🚀 Developer Mode: UNLOCKED");
            tapCount = 0;
        }
    });

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        initAudio();
        const now = audioCtx.currentTime;
        if (type === 'tap') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, now);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.2);
        } else {
            const freqs = [2000, 3000, 4500];
            freqs.forEach((f, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.frequency.setValueAtTime(f, now + (i * 0.02));
                g.gain.setValueAtTime(0.04, now);
                g.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
                o.connect(g);
                g.connect(audioCtx.destination);
                o.start();
                o.stop(now + 1.2);
            });
        }
    }

    function createStarBurst(x, y) {
        for (let i = 0; i < 20; i++) {
            const s = document.createElement('div');
            s.className = 'star-particle';
            s.innerText = ['✨','💎','⭐','🌟'][Math.floor(Math.random()*4)];
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            const a = Math.random() * Math.PI * 2;
            const d = 120 + Math.random() * 120;
            s.style.setProperty('--tx', Math.cos(a) * d + "px");
            s.style.setProperty('--ty', Math.sin(a) * d + "px");
            s.style.setProperty('--tr', Math.random() * 360 + "deg");
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }
    }

    function uranaiAction(e) {
        initAudio();
        const count = getCount();
        if (!isDevMode && count >= 3) return;
        
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        createStarBurst(clientX, clientY);
        playSound('tap');
        document.getElementById('flash-overlay').classList.add('flash-active');

        setTimeout(() => {
            const res = uranaiData[Math.floor(Math.random() * uranaiData.length)];
            showResult(res);
            playSound('bell');
            if (!isDevMode) setCount(count + 1);
            document.getElementById('flash-overlay').classList.remove('flash-active');
        }, 500);
    }

    function showResult(res) {
        const img = document.getElementById('res-img');
        img.classList.remove('loaded');
        img.src = images[res.m];
        document.getElementById('start-area').classList.remove('active');
        document.getElementById('result-area').classList.add('active');
        
        const mEl = document.getElementById('res-member');
        mEl.innerText = `ラッキーメンバー ${res.m}`;
        mEl.style.color = res.c;

        const fEl = document.getElementById('res-fortune');
        fEl.innerText = res.t;
        fEl.style.color = res.c;
        
        document.getElementById('res-desc').innerText = res.d;
        
        const tweetText = `✨ RapiNz Z神社 ✨\n本日のラッキーメンバーは【${res.m}】💎\n運勢は【${res.t}】でした！\n\n#RapiNz #RapiNz宇宙御朱印`;
        const tweetUrl = window.location.href.split('?')[0];
        document.getElementById('x-share').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(tweetUrl)}`;
    }

    function getCount() {
        const d = new Date().toLocaleDateString();
        if (localStorage.getItem('z_date') !== d) {
            localStorage.setItem('z_date', d);
            localStorage.setItem('z_count', '0');
        }
        return parseInt(localStorage.getItem('z_count') || '0');
    }

    function setCount(c) {
        localStorage.setItem('z_count', c);
        updateUI();
    }
    
    function updateUI() {
        const count = getCount();
        const rem = 3 - count;
        document.getElementById('limit-display').innerText = isDevMode ? "🚀 Developer Mode Active" : `本日あと ${rem} 回`;
        document.getElementById('draw-btn').disabled = (!isDevMode && rem <= 0);
    }

    function updateVisitors() {
        const d = new Date().toLocaleDateString();
        const VERSION = "1.2";
        if(localStorage.getItem('v_version') !== VERSION) {
            localStorage.setItem('v_today', "0");
            localStorage.setItem('v_total', "0");
            localStorage.setItem('v_version', VERSION);
        }

        let today = parseInt(localStorage.getItem('v_today') || "0");
        let total = parseInt(localStorage.getItem('v_total') || "0");
        
        if (localStorage.getItem('v_date') !== d) {
            today = 0;
            localStorage.setItem('v_date', d);
        }
        
        today++;
        total++;
        localStorage.setItem('v_today', today);
        localStorage.setItem('v_total', total);
        
        document.getElementById('v-today').innerText = today.toLocaleString();
        document.getElementById('v-total').innerText = total.toLocaleString();
    }

    function resetUI() {
        document.getElementById('result-area').classList.remove('active');
        document.getElementById('start-area').classList.add('active');
        updateUI();
    }

    updateVisitors();
    updateUI();

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12') e.preventDefault();
        if (e.ctrlKey && (e.key === 'u' || e.key === 'c' || e.key === 's' || (e.shiftKey && (e.key === 'I' || e.key === 'J')))) {
            e.preventDefault();
        }
    });
